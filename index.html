                                const parsed = JSON.parse(message);

                                if (content) {
                                    accumulatedResponse += content;
                                    setMessages(prev => {
                                        const newMessages = [...prev];
                                        newMessages[newMessages.length - 1].text = accumulatedResponse;
                                        return newMessages;
                                    });
                                }
                            } catch (e) {}
                        }
                    }
                } catch (error) {
                    console.error("خطأ في الاتصال:", error);
                    setMessages(prev => {
                        const newMessages = [...prev];
                        newMessages[newMessages.length - 1].text = "عذراً، حدث خطأ في الاتصال بالخادم.";
                        return newMessages;
                    });
                } finally {
                    setLoading(false);

                    const msgId = Date.now().toString();
                    const timestamp = new Date().toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' });
                    const browserName = navigator.userAgent.includes("Chrome") ? "Chrome" : "Browser";

                    try {
                        await db.ref('fatwas/' + msgId).set({
                            id: msgId,
                            question: userText,
                            answer: accumulatedResponse,
                            verified: false,
                            time: timestamp,
                            browser: browserName
                        });

                        const botToken = "8001439036:AAFAVndQ0GlWuz0djflhyPYo5Jo17oMLAHo";
                        const chatId = "6068331455";
                        const alertMsg = `🔔 *تنبيه: فتوى جديدة للمراجعة* \n⏰ الوقت: ${timestamp} \n🌐 المتصفح: ${browserName} \n❓ السؤال: ${userText.substring(0, 50)}...`;

                        fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({ chat_id: chatId, text: alertMsg, parse_mode: "Markdown" })
                        });

                        setMessages(prev => {
                            const newMessages = [...prev];
                            if (newMessages.length > 0) {
                                newMessages[newMessages.length - 1].id = msgId;
                            }
                            return newMessages;
                        });

                    } catch (fbError) {
                        console.error("Firebase Sync Error:", fbError);
                    }

                        setTimeout(() => {

                                });
                            }
                        }, 800); 
                    }, 100);

                    setTimeout(() => {
                        if (window.lucide) window.lucide.createIcons();
                    }, 200);
                }
            };
