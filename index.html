function UserMessage({ text }) {
    const [isExpanded, setIsExpanded] = React.useState(false);
    const maxLength = 150; // يمكنك تغيير هذا الرقم للتحكم في متى يختصر النص
    const isLongText = text && text.length > maxLength;

    const displayText = isExpanded ? text : text.slice(0, maxLength);

    return (
        <div className="flex flex-col gap-4 mb-12 animate-in fade-in slide-in-from-bottom-5">
            <div className="flex items-center gap-3">
                <div className="w-10 h-10 rounded-xl bg-[#3B82F6] flex items-center justify-center text-white shrink-0 shadow-[0_0_15px_rgba(59,130,246,0.5)]">

                </div>
                <span className="text-[#3B82F6] font-[900] text-xl tracking-widest drop-shadow-[0_0_8px_rgba(59,130,246,0.4)]">
                    سؤالك:
                </span>
            </div>

            <div className="pr-12 relative">
                <h2 className="text-2xl font-black leading-tight dark:text-white text-slate-900 drop-shadow-sm transition-all duration-300">
                    {displayText}
                    {!isExpanded && isLongText && "..."}
                </h2>

                {isLongText && (
                    <button 
                        onClick={() => {
                            setIsExpanded(!isExpanded);
                            setTimeout(() => window.lucide.createIcons(), 10); // لتحديث أيقونة السهم فوراً
                        }}
                        className="mt-3 flex items-center gap-2 text-[#3B82F6] font-bold hover:text-blue-400 transition-all"
                    >
                        {isExpanded ? "عرض أقل" : "عرض السؤال كاملاً"}
                        <i data-lucide={isExpanded ? "chevron-up" : "chevron-down"} className="w-4 h-4"></i>
                    </button>
                )}
            </div>
        </div>
    );
}

يجب أن تكون إجاباتك مستمدة حصراً من المنهج السلفي ومصادر أهل السنة والجماعة.

         const handleAsk = async () => {
    if (!input.trim() || loading) return;

    const userText = input; // حفظ السؤال
    let accumulatedResponse = ""; // تعريف المتغير ليراه بلوك finally

    // 1. إضافة الرسائل للواجهة
    setMessages(prev => [
        ...prev, 
        { role: 'user', text: userText },
        { role: 'ai', text: "" } 
    ]);
    
    setInput("");
    setLoading(true);
    setIsUserScrollingUp(false); 

    try {
        const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
            method: "POST",
            headers: {
                "Authorization": `Bearer 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`,
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                model: "llama-3.3-70b-versatile",
                messages: [
                    { role: "system", content: systemPrompt },
                    { role: "user", content: userText }
                ],
                temperature: 0.3,
                stream: true,
            })
        });

        const reader = response.body.getReader();
        const decoder = new TextDecoder("utf-8");

        while (true) {
            const { done, value } = await reader.read();
            if (done) break;

            const chunk = decoder.decode(value);
            const lines = chunk.split("\n");

            for (const line of lines) {
                const message = line.replace(/^data: /, "").trim();
                if (message === "" || message === "[DONE]") continue;

                try {
                    const parsed = JSON.parse(message);
                    const content = parsed.choices[0].delta.content;
                    if (content) {
                        accumulatedResponse += content;
                        setMessages(prev => {
                            const newMessages = [...prev];
                            newMessages[newMessages.length - 1].text = accumulatedResponse;
                            return newMessages;
                        });
                    }
                } catch (e) {}
            }
        }
    } catch (error) {
        console.error("خطأ في الاتصال:", error);
        setMessages(prev => {
            const newMessages = [...prev];
            newMessages[newMessages.length - 1].text = "عذراً، حدث خطأ في الاتصال بالخادم.";
            return newMessages;
        });
    } finally {
        setLoading(false);

        // --- إعدادات الحفظ والتنبيه ---
        const msgId = Date.now().toString();
        const timestamp = new Date().toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' });
        const browserName = navigator.userAgent.includes("Chrome") ? "Chrome" : "Browser";

        try {
            // 1. الحفظ في Firebase (للتوثيق اللحظي)
            await db.ref('fatwas/' + msgId).set({
                id: msgId,
                question: userText,
                answer: accumulatedResponse,
                verified: false,
                time: timestamp,
                browser: browserName
            });

            // 2. إرسال التنبيه لتليجرام
            const botToken = "8001439036:AAFAVndQ0GlWuz0djflhyPYo5Jo17oMLAHo";
            const chatId = "6068331455";
            const alertMsg = `🔔 *تنبيه: فتوى جديدة للمراجعة* \n⏰ الوقت: ${timestamp} \n🌐 المتصفح: ${browserName} \n❓ السؤال: ${userText.substring(0, 50)}...`;

            fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ chat_id: chatId, text: alertMsg, parse_mode: "Markdown" })
            });

            // 3. ربط الـ ID بالرسالة الحالية ليظهر "الصح" لاحقاً
            setMessages(prev => {
                const newMessages = [...prev];
                if (newMessages.length > 0) {
                    newMessages[newMessages.length - 1].id = msgId;
                }
                return newMessages;
            });

        } catch (fbError) {
            console.error("Firebase Sync Error:", fbError);
        }

        // --- ميزة الانتقال الذكي (التي سقطت سهواً) ---
        setTimeout(() => {
            // أولاً النزول لآخر الرد لضمان تحميل المساحة
            messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });

            // ثانياً القفزة لبداية كارت السؤال
            setTimeout(() => {
                const allMessages = document.querySelectorAll('.animate-in');
                if (allMessages.length >= 2) {
                    const userQuestionCard = allMessages[allMessages.length - 2];
                    userQuestionCard.scrollIntoView({ 
                        behavior: "smooth", 
                        block: "start" 
                    });
                }
            }, 800); 
        }, 100);

        // تحديث الأيقونات (Lucide)
        setTimeout(() => {
            if (window.lucide) window.lucide.createIcons();
        }, 200);
    }
};

<div className="fixed top-[73px] w-full bg-[#3B82F6]/5 border-b border-[#3B82F6]/20 py-2 overflow-hidden whitespace-nowrap z-40">

        </span>
        <span className="mx-4 text-sm font-black text-[#3B82F6] drop-shadow-[0_0_8px_rgba(59,130,246,0.5)]">

        </span>
        <span className="mx-4 text-sm font-black text-[#3B82F6] drop-shadow-[0_0_8px_rgba(59,130,246,0.5)]">

    </div>
</div>

                    <main className="flex-1 overflow-y-auto pt-32 pb-48 custom-scroll px-8">

                                <div key={i} className="mb-12 animate-in fade-in slide-in-from-bottom-5">
                                    {msg.role === 'user' ? (
    <UserMessage text={msg.text} />
) : (
  <div className="ai-card relative group bg-white/70 dark:bg-slate-900/60 backdrop-blur-md p-8 rounded-[32px] border border-slate-200 dark:border-slate-800 shadow-xl mb-12">
    
    {/* الهيدر العلوي الجديد: يجمع بين الحالة والنسخ */}

        {/* الجهة اليمنى: الدوائر والحالة */}
        <div className="flex flex-col items-start gap-1">
            {/* النص المتوهج فوق الدوائر */}
            <span className={`status-text-glow text-[11px] px-2 py-0.5 rounded-md ${msg.verified ? 'text-green-500' : 'dark:text-white text-black'}`}>
                {msg.verified ? "إجابة معتمدة" : "قيد المراجعة العلمية"}
            </span>
            
            <div className="flex items-center gap-2 mr-1">
                {/* الدائرة الأولى: زرقاء دائماً (تعبر عن ذكاء الآلة) */}
                <div className="status-circle bg-blue-500 shadow-[0_0_10px_rgba(59,130,246,0.5)]">
                    <i data-lucide="cpu" className="w-3 h-3 text-white"></i>
                </div>

                {/* الدائرة الثانية: تتغير عند التوثيق */}
                {msg.verified ? (
                    <div className="status-circle circle-verified animate-in zoom-in">
                        <i data-lucide="check" className="w-4 h-4 text-white font-bold"></i>
                    </div>
                ) : (
                    <div className="status-circle bg-slate-300 dark:bg-slate-700">
                        <i data-lucide="clock" className="w-3 h-3 text-white opacity-50"></i>
                    </div>
                )}
            </div>
        </div>

        {/* الجهة اليسرى: زر النسخ كما هو مع توهج أزرق */}
        <button

    {/* محتوى الرد */}
    <div className="text-lg font-medium leading-relaxed dark:text-slate-200 text-slate-700 mt-4">
        {formatAIContent(msg.text)}
    </div>

)}


                                </div>

                             {loading && (
            <div className="flex items-center gap-4 text-blue-500 font-bold animate-pulse text-xl mb-10">

                                    <input

                                        value={input}
                                        onChange={(e) => setInput(e.target.value)}
                                        onKeyDown={(e) => e.key === 'Enter' && handleAsk()}
                                        placeholder="كيف يمكنني مساعدتك اليوم؟"
                                        className="flex-1 bg-transparent border-none outline-none text-xl py-4 dark:text-white text-slate-900 placeholder-slate-400 px-4 font-medium"
                                    />
                                    <button 
                                        onClick={handleAsk}
                                        className="bg-blue-600 hover:bg-blue-700 text-white w-14 h-14 rounded-2xl flex items-center justify-center transition-all shadow-lg active:scale-95"
                                    >
                                        <i data-lucide="send-horizontal" className="w-7 h-7 rotate-180"></i>
                                    </button>
                                </div>
                            </div>

                            </p>
                        </div>
                    </footer>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
